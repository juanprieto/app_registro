<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SECE</title>

<link rel="icon" type="image/png" href="logo.png">

<style>

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    max-width: 1100px;
    margin: auto;
    padding: 10px;
    background-color: #f8f9fa;
}

h1 {
    text-align: center;
    color: rgb(167,188,75);
    border-bottom: 2px solid rgb(167,188,75);
    padding-bottom: 10px;
}

h3 {
    color: rgb(167,188,75);
    margin-top: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
    margin-bottom: 15px;
}

label {
    font-size: 14px;
    font-weight: 600;
}

input, select {
    width: 100%;
    padding: 7px;
    margin-bottom: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.consumo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
}

.consumo-card {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px;
    background: #fff;
}

.consumo-card h4 {
    margin: 0 0 8px 0;
    color: rgb(167,188,75);
    font-size: 14px;
}

button {
    background: rgb(167,188,75);
    color: white;
    padding: 14px;
    border: none;
    border-radius: 6px;
    width: 100%;
    font-weight: bold;
}

.logo-container {
    text-align: center;
    margin-bottom: 10px;
}

.logo-img {
    max-width: 180px;
}

</style>
</head>

<body>

<div class="logo-container">
<img src="logo.png" class="logo-img">
</div>

<h1>Cuestionario SECE</h1>

<label>A7. Ocupación</label>

<label>A9. Situación laboral</label>

<option value="0">Tiempo Completo</option>

<option value="2">Paro</option>

    <label>A10. Depende Económicamente de Alguien</label>
<select id="A10">
<option value="o">En Absoluto</option>
<option value="1">Parcialmente</option>
<option value="2">Totalmente</option>
</select>

<label>A11. Fuente ingresos</label>
<select id="A11">
<option value="1">Empleo</option>

</select>

<label>A12. Ingresos</label>
<select id="A12">
<option value="0"><1000€</option>
<option value="3">+4000€</option>
</select>

<label>A13. Convivientes</label>

<label>A14. Personas a cargo</label>

<label>A15. Cubre necesidades</label>
<select id="A15">
<option value="0">No</option>

</select>

<label>A16. Deriva</label>
<select id="A16">
<option value="0">Usuario</option>
<option value="1">Familia</option>
</select>

<label>A17. Paga tratamiento</label>
<select id="A17">
<option value="0">Usuario</option>
<option value="1">Familia</option>
</select>

</div>

<!-- B -->
<div class="card">
<h3>B. Clínico</h3>

<label>B1. Nº tratamientos</label>
<input id="B1" type="number">

<label>B2. Fecha primer tratamiento</label>
<input id="B2" type="date">

<label>B3. Inicio tratamiento actual</label>
<input id="B3" type="date">

<label>B4. Recaídas</label>
<input id="B4" type="number">

<label>B5. Fecha último consumo</label>

<select id="B6">

</select>

<select id="B7">

</select>

<!-- BZD -->

<!-- MDMA -->
<div class="consumo-card">
<h4>MDMA</h4>
<label>K1 Inicio</label><input id="K1" type="date">
<label>K2 Fin</label><input id="K2" type="date">
<label>K3 Cómo</label><select id="K3"></select>

</div>

</div>

</div>

<button onclick="guardar()">Guardar</button>

<script>
function guardar(){
    const datos = {};
    document.querySelectorAll("input, select").forEach(el=>{
        if(el.id) datos[el.id] = el.value;
    });
    console.log(datos);
    alert("OK");
}
</script>

</body>
</html>
