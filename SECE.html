<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SECE</title>

<link rel="icon" type="image/png" href="logo.png">

<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    max-width: 1100px;
    margin: auto;
    padding: 10px;
    background-color: #f8f9fa;
}

h1 {
    text-align: center;
    color: rgb(167,188,75);
    border-bottom: 2px solid rgb(167,188,75);
    padding-bottom: 10px;
}

h3 {
    color: rgb(167,188,75);
    margin-top: 25px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

td, th {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: center;
    font-size: 13px;
}

button {
    background: rgb(167,188,75);
    color: white;
    padding: 14px;
    border: none;
    border-radius: 6px;
    width: 100%;
    font-weight: bold;
    cursor: pointer;
}

.logo-container {
    text-align: center;
    margin-bottom: 10px;
}

.logo-img {
    max-width: 200px;
}
</style>
</head>

<body>

<div class="logo-container">
    <img src="logo.png" class="logo-img">
</div>

</div>

</select>

<select id="A17">

<option value="1">Familia</option>
</select>

<!-- B -->
<div class="card">

<input id="O1" placeholder="O1 Principal">
<input id="O2" placeholder="O2 Segunda">

</div>

<button onclick="guardar()">Guardar</button>

<script>
function guardar(){
    const datos = {};
    document.querySelectorAll("input, select").forEach(el=>{
        if(el.id) datos[el.id] = el.value;
    });
    console.log(datos);
    alert("Datos capturados (ver consola)");
}
</script>

</body>
</html>
