<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SECE Completo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; padding:20px;}
h3 { margin-top:30px;}
input, select { width:100%; margin-bottom:10px;}
table { border-collapse: collapse; width:100%; margin-top:20px;}
td, th { border:1px solid #ccc; padding:6px; text-align:center;}
</style>
</head>

<body>

<h2>Cuestionario SECE</h2>

<!-- Z -->
<h3>Datos</h3>
<input id="nombre" placeholder="Nombre">
<input id="codigo_usuario" placeholder="Código usuario">
<input id="codigo_pulsera" placeholder="Código pulsera">
<input type="date" id="fecha_realizacion">

<!-- A -->
<h3>Datos personales</h3>
<input type="date" id="fecha_nacimiento">

<select id="genero">
<option value="1">Masculino</option>
<option value="2">Femenino</option>
<option value="3">No binario</option>
</select>

<select id="estado_civil">
<option value="1">Casado</option>
<option value="6">Soltero</option>
</select>

<select id="nivel_estudios">
<option value="1">ESO</option>
<option value="2">Bachillerato</option>
<option value="3">FP</option>
</select>

<!-- B -->
<h3>Clínico</h3>
<input type="number" id="ttos_iniciados" placeholder="Tratamientos iniciados">
<input type="number" id="recaidas" placeholder="Recaídas">
<input type="date" id="tiempo_abstinencia">

<select id="importancia_tratamiento">
<option value="0">Ninguna</option>
<option value="4">Extrema</option>
</select>

<!-- D -->
<h3>Problemas</h3>
<select id="problema_principal">
<option value="1">Laboral</option>
<option value="2">Familiar</option>
<option value="3">Amistades</option>
<option value="4">Pareja</option>
<option value="5">Legal</option>
<option value="6">Salud</option>
</select>

<!-- CONSUMO -->
<h3>Consumo</h3>

<table>
<tr>
<th></th><th>THC</th><th>OH</th><th>COC</th><th>OP</th><th>KETA</th><th>BZD</th><th>MDMA</th><th>LUDO</th><th>SEXO</th><th>OTRAS</th>
</tr>

<tr>
<td>Inicio</td>
<td><input id="thc_inicio"></td>
<td><input id="oh_inicio"></td>
<td><input id="coc_inicio"></td>
<td><input id="op_inicio"></td>
<td><input id="keta_inicio"></td>
<td><input id="bzd_inicio"></td>
<td><input id="mdma_inicio"></td>
<td><input id="ludo_inicio"></td>
<td><input id="sexo_inicio"></td>
<td><input id="otras_inicio"></td>
</tr>

<tr>
<td>Fin</td>
<td><input id="thc_fin"></td>
<td><input id="oh_fin"></td>
<td><input id="coc_fin"></td>
<td><input id="op_fin"></td>
<td><input id="keta_fin"></td>
<td><input id="bzd_fin"></td>
<td><input id="mdma_fin"></td>
<td><input id="ludo_fin"></td>
<td><input id="sexo_fin"></td>
<td><input id="otras_fin"></td>
</tr>

<tr>
<td>Cómo</td>
<td><select id="thc_como"><option value="1">Oral</option><option value="2">Inhalada</option><option value="3">Fumada</option></select></td>
<td><select id="oh_como"><option value="1">Oral</option></select></td>
<td><select id="coc_como"><option value="2">Inhalada</option></select></td>
<td><select id="op_como"><option value="4">Inyectada</option></select></td>
<td><select id="keta_como"><option value="2">Inhalada</option></select></td>
<td><select id="bzd_como"><option value="1">Oral</option></select></td>
<td><select id="mdma_como"><option value="1">Oral</option></select></td>
<td><select id="ludo_como"><option value="5">Conductual</option></select></td>
<td><select id="sexo_como"><option value="5">Conductual</option></select></td>
<td><select id="otras_como"><option value="5">Otro</option></select></td>
</tr>

<tr>
<td>Frecuencia</td>
<td><select id="thc_frecuencia"><option value="0">No</option><option value="4">Diario</option></select></td>
<td><select id="oh_frecuencia"><option value="4">Diario</option></select></td>
<td><select id="coc_frecuencia"><option value="3">Semanal</option></select></td>
<td><select id="op_frecuencia"><option value="4">Diario</option></select></td>
<td><select id="keta_frecuencia"><option value="2">Semanal</option></select></td>
<td><select id="bzd_frecuencia"><option value="4">Diario</option></select></td>
<td><select id="mdma_frecuencia"><option value="1">Mensual</option></select></td>
<td><select id="ludo_frecuencia"><option value="3">Frecuente</option></select></td>
<td><select id="sexo_frecuencia"><option value="3">Frecuente</option></select></td>
<td><select id="otras_frecuencia"><option value="2">Media</option></select></td>
</tr>

</table>

<br>
<button onclick="guardar()">Guardar</button>

<script>

const supabaseUrl = "https://TU_URL.supabase.co";
const supabaseKey = "TU_KEY";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

function g(id){ return document.getElementById(id).value }

async function guardar(){

const data = {
nombre: g("nombre"),
codigo_usuario: g("codigo_usuario"),
codigo_pulsera: g("codigo_pulsera"),
fecha_nacimiento: g("fecha_nacimiento"),
genero: g("genero"),
estado_civil: g("estado_civil"),
nivel_estudios: g("nivel_estudios"),
ttos_iniciados: g("ttos_iniciados"),
recaidas: g("recaidas"),
tiempo_abstinencia: g("tiempo_abstinencia"),
importancia_tratamiento: g("importancia_tratamiento"),
problema_principal: g("problema_principal"),

thc_inicio: g("thc_inicio"),
thc_fin: g("thc_fin"),
thc_como: g("thc_como"),
thc_frecuencia: g("thc_frecuencia")

};

const { error } = await supabaseClient
.from("cuestionario_sece")
.insert([data]);

if(error){ alert(error.message) }
else{ alert("Guardado") }

}

</script>

</body>
</html>
