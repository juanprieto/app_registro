<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SECE Completo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; padding:20px;}
h3 { margin-top:30px;}
input, select { width:100%; margin-bottom:10px;}
table { border-collapse: collapse; width:100%; margin-top:20px;}
td, th { border:1px solid #ccc; padding:6px; text-align:center;}
</style>
</head>

<body>

<h2>Cuestionario SECE</h2>

<!-- Z -->
<h3>Datos</h3>
<input id="nombre" placeholder="Nombre">
<input id="codigo_usuario" placeholder="Código usuario">
<input id="codigo_pulsera" placeholder="Código pulsera">
<input type="date" id="fecha_realizacion">

<!-- A -->
<h3>Datos socioeconómicos</h3>

<input type="date" id="fecha_nacimiento">

<select id="genero">
<option value="1">Masculino</option>
<option value="2">Femenino</option>
<option value="3">No binario</option>
</select>

<select id="estado_civil">
<option value="1">Casado</option>
<option value="6">Soltero</option>
</select>

<select id="tiempo_pareja">
<option value="0">Sin pareja</option>
<option value="1"><1 año</option>
<option value="2">1-3 años</option>
<option value="3">3-10 años</option>
<option value="4">+10 años</option>
</select>

<select id="nivel_estudios">
<option value="1">ESO</option>
<option value="2">Bachillerato</option>
<option value="3">FP</option>
<option value="4">Universidad</option>
<option value="5">Postgrado</option>
</select>

<select id="estudia_actualmente">
<option value="0">No</option>
<option value="1">Sí</option>
</select>

<input id="ocupacion" placeholder="Ocupación">

<select id="responsabilidad">
<option value="0">Baja</option>
<option value="1">Media</option>
<option value="2">Alta</option>
</select>

<select id="situacion_laboral">
<option value="0">Tiempo completo</option>
<option value="1">Parcial</option>
<option value="2">Paro</option>
<option value="3">Baja</option>
</select>

<select id="dependencia">
<option value="0">No</option>
<option value="1">Parcial</option>
<option value="2">Total</option>
</select>

<select id="fuente_ingresos">
<option value="1">Trabajo</option>
<option value="4">Paro</option>
<option value="8">Familia</option>
<option value="9">Ilegal</option>
</select>

<select id="ingresos">
<option value="0"><1000€</option>
<option value="1">1000-2000€</option>
<option value="2">2000-4000€</option>
<option value="3">4000€+</option>
</select>

<input id="convivientes" type="number" placeholder="Nº convivientes">
<input id="personas_cargo" type="number" placeholder="Personas a cargo">

<select id="cubre_necesidades">
<option value="0">No</option>
<option value="1">Sí</option>
</select>

<select id="derivacion">
<option value="0">Usuario</option>
<option value="1">Familia</option>
<option value="2">Amigos</option>
<option value="3">Pareja</option>
</select>

<select id="paga_tratamiento">
<option value="0">Usuario</option>
<option value="1">Familia</option>
<option value="2">Amigos</option>
<option value="3">Pareja</option>
</select>

<!-- B -->
<h3>Clínico</h3>

<input type="number" id="ttos_iniciados" placeholder="Nº tratamientos">
<input type="date" id="fecha_primer_tto">
<input type="date" id="fecha_inicio_actual">

<input type="number" id="recaidas" placeholder="Recaídas">
<input type="date" id="tiempo_abstinencia">

<select id="importancia">
<option value="0">Ninguna</option>
<option value="4">Extrema</option>
</select>

<select id="abstinencia_1ano">
<option value="0">No</option>
<option value="1">Sí</option>
</select>

<input id="antecedentes_tox" placeholder="Antecedentes toxicológicos">
<input id="antecedentes_psiq" placeholder="Antecedentes psiquiátricos">

<input id="consultas_psico" type="number" placeholder="Nº consultas">

<select id="medicacion">
<option value="0">No</option>
<option value="1">Sí</option>
</select>

<select id="importancia_salud_mental">
<option value="0">Ninguna</option>
<option value="4">Extrema</option>
</select>

<!-- D -->
<h3>Problemas</h3>

<select id="problema_principal">
<option value="1">Laboral</option>
<option value="2">Familiar</option>
<option value="3">Amistades</option>
<option value="4">Pareja</option>
<option value="5">Legal</option>
<option value="6">Salud</option>
</select>

<select id="problema_influye">
<option value="1">Laboral</option>
<option value="2">Familiar</option>
<option value="3">Amistades</option>
<option value="4">Pareja</option>
<option value="5">Legal</option>
<option value="6">Salud</option>
</select>

<!-- CONSUMO -->
<h3>Consumo</h3>

<table>
<tr>
<th></th><th>THC</th><th>OH</th><th>COC</th><th>OP</th><th>KETA</th><th>BZD</th><th>MDMA</th><th>LUDO</th><th>SEXO</th><th>OTRAS</th>
</tr>

<tr><td>Inicio</td>
<td><input id="thc_inicio"></td><td><input id="oh_inicio"></td><td><input id="coc_inicio"></td>
<td><input id="op_inicio"></td><td><input id="keta_inicio"></td><td><input id="bzd_inicio"></td>
<td><input id="mdma_inicio"></td><td><input id="ludo_inicio"></td><td><input id="sexo_inicio"></td>
<td><input id="otras_inicio"></td>
</tr>

<tr><td>Fin</td>
<td><input id="thc_fin"></td><td><input id="oh_fin"></td><td><input id="coc_fin"></td>
<td><input id="op_fin"></td><td><input id="keta_fin"></td><td><input id="bzd_fin"></td>
<td><input id="mdma_fin"></td><td><input id="ludo_fin"></td><td><input id="sexo_fin"></td>
<td><input id="otras_fin"></td>
</tr>

<tr><td>Cómo</td>
<td><select id="thc_como"><option value="1">Oral</option><option value="2">Inhalada</option><option value="3">Fumada</option></select></td>
<td><select id="oh_como"><option value="1">Oral</option></select></td>
<td><select id="coc_como"><option value="2">Inhalada</option></select></td>
<td><select id="op_como"><option value="4">Inyectada</option></select></td>
<td><select id="keta_como"><option value="2">Inhalada</option></select></td>
<td><select id="bzd_como"><option value="1">Oral</option></select></td>
<td><select id="mdma_como"><option value="1">Oral</option></select></td>
<td><select id="ludo_como"><option value="5">Conductual</option></select></td>
<td><select id="sexo_como"><option value="5">Conductual</option></select></td>
<td><select id="otras_como"><option value="5">Otro</option></select></td>
</tr>

<tr><td>Frecuencia</td>
<td><select id="thc_frecuencia"><option value="0">No</option><option value="4">Diario</option></select></td>
<td><select id="oh_frecuencia"><option value="4">Diario</option></select></td>
<td><select id="coc_frecuencia"><option value="3">Semanal</option></select></td>
<td><select id="op_frecuencia"><option value="4">Diario</option></select></td>
<td><select id="keta_frecuencia"><option value="2">Semanal</option></select></td>
<td><select id="bzd_frecuencia"><option value="4">Diario</option></select></td>
<td><select id="mdma_frecuencia"><option value="1">Mensual</option></select></td>
<td><select id="ludo_frecuencia"><option value="3">Frecuente</option></select></td>
<td><select id="sexo_frecuencia"><option value="3">Frecuente</option></select></td>
<td><select id="otras_frecuencia"><option value="2">Media</option></select></td>
</tr>

</table>

<h3>Sustancias más problemáticas</h3>
<input id="top1" placeholder="1ª sustancia">
<input id="top2" placeholder="2ª sustancia">
<input id="top3" placeholder="3ª sustancia">

<br><br>
<button onclick="guardar()">Guardar</button>

<script>
const supabaseUrl = "https://TU_URL.supabase.co";
const supabaseKey = "TU_KEY";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

function g(id){ return document.getElementById(id).value }

async function guardar(){

const data = {
nombre: g("nombre"),
codigo_usuario: g("codigo_usuario"),
genero: g("genero"),
estado_civil: g("estado_civil"),
nivel_estudios: g("nivel_estudios"),
ttos_iniciados: g("ttos_iniciados"),
recaidas: g("recaidas"),
problema_principal: g("problema_principal"),
top1: g("top1"),
top2: g("top2"),
top3: g("top3"),
thc_inicio: g("thc_inicio"),
thc_fin: g("thc_fin")
};

const { error } = await supabaseClient
.from("cuestionario_sece")
.insert([data]);

if(error){ alert(error.message) }
else{ alert("Guardado") }

}
</script>

</body>
</html>
