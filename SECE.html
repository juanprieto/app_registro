<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SECE</title>

<style>
body { font-family: Arial; padding:20px; max-width:1000px; margin:auto;}
h2 { border-bottom:2px solid black;}
h3 { margin-top:30px;}
label { font-weight:bold;}
input, select { width:100%; margin-bottom:10px; padding:5px;}
table { border-collapse: collapse; width:100%; margin-top:20px;}
td, th { border:1px solid #ccc; padding:6px; text-align:center;}
</style>

</head>

<body>

<h2>SECE</h2>

<!-- Z -->
<h3>Identificación</h3>

<label>Nombre</label><input>
<label>Código Usuario</label><input>
<label>Código Pulsera</label><input>
<label>Fecha</label><input type="date">

<!-- A -->
<h3>Variables socioeconómicas</h3>

<label>Fecha nacimiento</label><input type="date">

<label>Género</label>
<select>
<option value="1">Masculino</option>
<option value="2">Femenino</option>
<option value="3">No binario</option>
</select>

<label>Estado civil</label>
<select>
<option value="1">Casado</option>
<option value="2">Pareja</option>
<option value="3">Viudo</option>
<option value="4">Divorciado</option>
<option value="5">Separado</option>
<option value="6">Soltero</option>
</select>

<label>Tiempo en pareja</label>
<select>
<option value="0">Sin pareja</option>
<option value="1"><1 año</option>
<option value="2">1-3 años</option>
<option value="3">3-10 años</option>
<option value="4">+10 años</option>
</select>

<label>Nivel estudios</label>
<select>
<option value="1">ESO</option>
<option value="2">Bachillerato</option>
<option value="3">FP</option>
<option value="4">Diplomatura</option>
<option value="5">Licenciatura</option>
<option value="6">Postgrado</option>
</select>

<label>Estudia actualmente</label>
<select><option value="0">No</option><option value="1">Sí</option></select>

<label>Ocupación</label><input>

<label>Nivel responsabilidad</label>
<select>
<option value="0">Baja</option>
<option value="1">Media</option>
<option value="2">Alta</option>
</select>

<label>Situación laboral</label>
<select>
<option value="0">Tiempo completo</option>
<option value="1">Tiempo parcial</option>
<option value="2">Paro</option>
<option value="3">Baja</option>
<option value="4">Fuera mercado</option>
</select>

<label>Dependencia económica</label>
<select>
<option value="0">No</option>
<option value="1">Parcial</option>
<option value="2">Total</option>
</select>

<label>Fuente ingresos</label>
<select>
<option value="1">Empleo</option>
<option value="4">Paro</option>
<option value="6">Servicios sociales</option>
<option value="8">Familia</option>
<option value="9">Ingresos ilegales</option>
</select>

<label>Ingresos</label>
<select>
<option value="0"><1000€</option>
<option value="1">1000-2000€</option>
<option value="2">2000-4000€</option>
<option value="3">4000€+</option>
</select>

<label>Nº convivientes</label><input type="number">
<label>Nº personas a cargo</label><input type="number">

<label>Cubre necesidades</label>
<select><option value="0">No</option><option value="1">Sí</option></select>

<label>Quién deriva</label>
<select>
<option value="0">Usuario</option>
<option value="1">Familia</option>
<option value="2">Amigos</option>
<option value="3">Pareja</option>
</select>

<label>Quién paga tratamiento</label>
<select>
<option value="0">Usuario</option>
<option value="1">Familia</option>
<option value="2">Amigos</option>
<option value="3">Pareja</option>
</select>

<!-- B -->
<h3>Variables clínicas</h3>

<label>Nº tratamientos</label><input type="number">
<label>Fecha primer tratamiento</label><input type="date">
<label>Inicio tratamiento actual</label><input type="date">

<label>Recaídas</label><input type="number">

<label>Fecha último consumo</label><input type="date">

<label>Importancia tratamiento</label>
<select>
<option value="0">Ninguna</option>
<option value="1">Leve</option>
<option value="2">Moderada</option>
<option value="3">Considerable</option>
<option value="4">Extrema</option>
</select>

<label>+1 año abstinente</label>
<select><option value="0">No</option><option value="1">Sí</option></select>

<label>Antecedentes toxicológicos</label><input>
<label>Antecedentes psiquiátricos</label><input>

<label>Nº consultas psicológicas</label><input type="number">

<label>Medicacion previa</label>
<select><option value="0">No</option><option value="1">Sí</option></select>

<label>Importancia salud mental</label>
<select>
<option value="0">Ninguna</option>
<option value="1">Leve</option>
<option value="2">Moderada</option>
<option value="3">Considerable</option>
<option value="4">Extrema</option>
</select>

<!-- D -->
<h3>Problemas</h3>

<label>Laboral</label>
<select><option value="0">Nada</option><option value="4">Muy grave</option></select>

<label>Familiar</label>
<select><option value="0">Nada</option><option value="4">Muy grave</option></select>

<label>Amistades</label>
<select><option value="0">Nada</option><option value="4">Muy grave</option></select>

<label>Pareja</label>
<select><option value="0">Nada</option><option value="4">Muy grave</option></select>

<label>Legal</label>
<select><option value="0">Nada</option><option value="4">Muy grave</option></select>

<label>Salud</label>
<select><option value="0">Nada</option><option value="4">Muy grave</option></select>

<label>Problema principal</label><input>
<label>Problema que influye</label><input>
