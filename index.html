    <script>
       

        const STORAGE_KEY = 'asistencia_v7_base64';
        const PACIENTES_CACHE_KEY = 'pacientes_activos_cache_v1';
        

let filaActiva = null;
let pacientesActivosCache = [];

window.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('fechaConfirmar').valueAsDate = new Date();

    const memoriaRaw = localStorage.getItem(STORAGE_KEY);
    let memoria = null;

    try {
        memoria = memoriaRaw ? JSON.parse(memoriaRaw) : null;
    } catch (e) {
        console.error("Memoria local corrupta:", e);
        localStorage.removeItem(STORAGE_KEY);
        memoria = null;
    }

    await cargarPacientesActivos();

    if (memoria && Array.isArray(memoria.filas) && memoria.filas.length > 0) {
        document.getElementById('fecha').value = memoria.fecha || "";
        document.getElementById('tbody').innerHTML = "";
        memoria.filas.forEach(f => restaurarFila(f));
        document.getElementById('bloqueoInicio').style.display = 'none';
        return;
    }

    document.getElementById('tbody').innerHTML = "";
    await cargarListaDefault();

    if (memoria && memoria.fecha) {
        document.getElementById('fecha').value = memoria.fecha;
        document.getElementById('bloqueoInicio').style.display = 'none';
        autoGuardar();
    } else {
        document.getElementById('bloqueoInicio').style.display = 'flex';
    }
});

      function confirmarFechaInicial() {
    const fVal = document.getElementById('fechaConfirmar').value;

    if (!fVal) {
        alert("Selecciona fecha");
        return;
    }

    document.getElementById('fecha').value = fVal;
    document.getElementById('bloqueoInicio').style.display = 'none';
    autoGuardar();
}

        function pintarCeldaCheck(el) {
            const td = el.parentElement;
            td.className = el.checked ? 'bg-verde' : 'bg-amarillo';
            autoGuardar();
        }

        function pintarCeldaEscala(select) {
            const td = select.parentElement;
            td.classList.remove('bg-verde', 'bg-amarillo', 'bg-naranja', 'bg-rojo');
            const val = select.value;
            if(val == "0") td.classList.add('bg-verde');
            else if(val == "1") td.classList.add('bg-amarillo');
            else if(val == "2") td.classList.add('bg-naranja');
            else if(val == "3") td.classList.add('bg-rojo');
            autoGuardar();
        }

        function pintarCeldaResultado(td) {
            const texto = td.textContent;
            td.classList.remove('bg-verde', 'bg-rojo');
            if(texto === "-") return;
            if(texto.includes("POS")) td.classList.add('bg-rojo');
            else td.classList.add('bg-verde');
        }

     function marcarMedicacion(cb) {
    const td = cb.parentElement;
    const idUsuario = cb.closest("tr").cells[0].querySelector(".paciente-idusuario")?.value || "";

    const paciente = pacientesActivosCache.find(
        p => p.ID_USUARIO === idUsuario
    );

    const requiereMedicacion = paciente?.medicacion === true;

    if (cb.checked) {
        td.classList.remove("bg-rojo");
        td.classList.add("bg-verde");
    } else {
        if (requiereMedicacion) {
            td.classList.remove("bg-verde");
            td.classList.add("bg-rojo");
        } else {
            td.classList.remove("bg-verde", "bg-rojo");
        }
    }

    autoGuardar();
}

     


    function agregarPaciente(idUsuario = '', nombreVisible = '') {
    const tr = document.createElement('tr');

    const paciente = pacientesActivosCache.find(
        p => p.ID_USUARIO === idUsuario
    );

    const nombreFinal = nombreVisible || paciente?.nombre || '';
    const idFinal = idUsuario || paciente?.ID_USUARIO || '';

    tr.innerHTML = `
        <td>
            <span class="paciente-nombre">${nombreFinal}</span>
            <input type="hidden" class="paciente-idusuario" value="${idFinal}">
        </td>
        <td class="bg-amarillo"><input type="checkbox" onchange="pintarCeldaCheck(this)"></td>
        <td class="bg-amarillo"><input type="checkbox" onchange="pintarCeldaCheck(this)"></td>
        <td><input type="checkbox" onchange="toggleMotivo(this)">
            <select class="motivo-select" onchange="pintarCeldaEscala(this)">
                <option value="0">Hoy no toca</option>
                <option value="1">No justifica</option>
                <option value="2">No quiere venir</option>
                <option value="3">Recaído</option>
            </select>
        </td>
        <td class="bg-amarillo"><input type="checkbox" onchange="abrirModal(this); pintarCeldaCheck(this);"></td>
        <td style="font-size:10px;">-</td>
        <td><input type="checkbox" onchange="autoGuardar()"></td>
        <td><input type="checkbox" class="medicacion" onchange="marcarMedicacion(this)"></td>
        <td class="bg-verde">
            <select onchange="pintarCeldaEscala(this)">
                <option value="0">BIEN</option>
                <option value="1">REGULAR</option>
                <option value="2">MAL</option>
                <option value="3">RECAÍDA</option>
            </select>
        </td>
    `;

    document.getElementById('tbody').appendChild(tr);

    const celdaMed = tr.cells[7];

    const aplicarColor = () => {
        const paciente = pacientesActivosCache.find(
            p => p.ID_USUARIO === idFinal
        );

        const requiere = paciente?.medicacion === true;
        const checkbox = tr.cells[7].querySelector(".medicacion");

        celdaMed.classList.remove("bg-rojo", "bg-verde");

        if (checkbox.checked) {
            celdaMed.classList.add("bg-verde");
        } else if (requiere) {
            celdaMed.classList.add("bg-rojo");
        }
    };

    aplicarColor();
}

       function restaurarFila(f) {
   agregarPaciente(f.idUsuario || f.pac);

    const tr = document.getElementById('tbody').lastElementChild;

    const cM = tr.cells[1].querySelector('input');
    cM.checked = f.m;
    pintarCeldaCheck(cM);

    const cT = tr.cells[2].querySelector('input');
    cT.checked = f.t;
    pintarCeldaCheck(cT);

    const checkNV = tr.cells[3].querySelector('input');
    const selNV = tr.cells[3].querySelector('select');
    if (f.nv) {
        checkNV.checked = true;
        selNV.classList.add('visible');
        selNV.value = f.mot;
        pintarCeldaEscala(selNV);
    }

    const cC = tr.cells[4].querySelector('input');
    cC.checked = f.c;
    pintarCeldaCheck(cC);

    tr.cells[5].textContent = f.res;
    pintarCeldaResultado(tr.cells[5]);

    tr.cells[6].querySelector('input').checked = f.rs;

    const checkMed = tr.cells[7].querySelector('input');
    checkMed.checked = f.md;
    marcarMedicacion(checkMed);

    const selR = tr.cells[8].querySelector('select');
    selR.value = f.rg;
    pintarCeldaEscala(selR);
}

       async function cargarListaDefault() {
    document.getElementById('tbody').innerHTML = '';
    pacientesActivosCache.forEach(p => agregarPaciente(p.ID_USUARIO));
}


        function autoGuardar() {
            const f = document.getElementById('fecha').value;
            if(!f) return;
    const filas = Array.from(document.querySelectorAll('#tbody tr')).map(tr => {
    const nombrePaciente = tr.cells[0].querySelector('.paciente-nombre')?.textContent || "";
    const idUsuario = tr.cells[0].querySelector('.paciente-idusuario')?.value || "";

    return {
        pac: nombrePaciente,
        idUsuario: idUsuario,
        m: tr.cells[1].querySelector('input').checked,
        t: tr.cells[2].querySelector('input').checked,
        nv: tr.cells[3].querySelector('input').checked,
        mot: tr.cells[3].querySelector('select').value,
        c: tr.cells[4].querySelector('input').checked,
        res: tr.cells[5].textContent,
        rs: tr.cells[6].querySelector('input').checked,
        md: tr.cells[7].querySelector('input').checked,
        rg: tr.cells[8].querySelector('select').value
    };
});
         
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ fecha: f, filas: filas }));
        }

        function toggleMotivo(cb) { 
            const sel = cb.nextElementSibling;
            sel.classList.toggle('visible', cb.checked);
            if(!cb.checked) cb.parentElement.className = '';
            else pintarCeldaEscala(sel);
            autoGuardar(); 
        }

        function abrirModal(cb) {
    filaActiva = cb.closest('tr');
    document.getElementById('modalPaciente').textContent =
        filaActiva.cells[0].querySelector('.paciente-nombre')?.textContent || "";
    const IDs = ['m_COC', 'm_OH', 'm_THC', 'm_BZD', 'm_OPI', 'm_KETA', 'm_AMP', 'm_MTD'];
    IDs.forEach(id => document.getElementById(id).value = "");
    document.getElementById('modalControles').style.display = 'block';
}

        function cerrarModal() { document.getElementById('modalControles').style.display = 'none'; }

        function guardarControles() {
            const IDs = ['m_COC', 'm_OH', 'm_THC', 'm_BZD', 'm_OPI', 'm_KETA', 'm_AMP', 'm_MTD'];
            let res = IDs.map(id => {
                const v = document.getElementById(id).value;
                return v ? `${id.replace('m_','')}:${v}` : null;
            }).filter(x => x).join(', ');
            filaActiva.cells[5].textContent = res || '-';
            pintarCeldaResultado(filaActiva.cells[5]);
            cerrarModal();
            autoGuardar();
        }

async function cargarPacientesActivos() {
    const cacheLocal = localStorage.getItem(PACIENTES_CACHE_KEY);

    try {
        const { data, error } = await client
            .from("pacientes")
            .select('nombre, "ID_USUARIO", medicacion')
            .eq("activo", true)
            .order("nombre", { ascending: true });

        if (error) throw error;

        pacientesActivosCache = data || [];
        localStorage.setItem(PACIENTES_CACHE_KEY, JSON.stringify(pacientesActivosCache));
        return pacientesActivosCache;

    } catch (error) {
        console.error("Error cargando pacientes desde Supabase:", error);

        if (cacheLocal) {
            try {
                pacientesActivosCache = JSON.parse(cacheLocal) || [];
                console.warn("Usando caché local de pacientes");
                return pacientesActivosCache;
            } catch (e) {
                console.error("Error leyendo caché local de pacientes:", e);
            }
        }

        pacientesActivosCache = [];
        return [];
    }
}
       

async function exportarExcel() {
    const fISO = document.getElementById('fecha').value;

    if (!fISO) {
        alert("No hay fecha activa");
        return;
    }

   

    const [y, m, d] = fISO.split('-');
    const fBonita = `${d}/${m}/${y}`;

    if (!confirm(`¿Exportar informe de fecha ${fBonita}?`)) return;

    // 1. Extraer datos de la tabla
    const filasDOM = Array.from(document.querySelectorAll('#tbody tr'));

    if (filasDOM.length === 0) {
        alert("No hay pacientes en pantalla para exportar.");
        return;
    }

    const data = filasDOM.map(tr => {
        const res = tr.cells[5].textContent;

        const check = (sust) => {
            if (!res || res === "-") return 1;
            if (res.includes(`${sust}:POS`)) return 2;
            if (res.includes(`${sust}:NEG`)) return 0;
            return 1;
        };

        return {
            "FECHA": fBonita,
            "PACIENTE": tr.cells[0].querySelector('.paciente-nombre')?.textContent || "",
            "ID_USUARIO": tr.cells[0].querySelector('.paciente-idusuario')?.value || "",
            "ASISTENCIA": tr.cells[3].querySelector('input').checked ? tr.cells[3].querySelector('select').value : 0,
            "MAÑANA": tr.cells[1].querySelector('input').checked ? "SI" : "NO",
            "TARDE": tr.cells[2].querySelector('input').checked ? "SI" : "NO",
            "CONTROL": tr.cells[4].querySelector('input').checked ? "SI" : "NO",
            "COC": check("COC"),
            "OH": check("OH"),
            "THC": check("THC"),
            "BZD": check("BZD"),
            "OPI": check("OPI"),
            "KETA": check("KETA"),
            "AMP": check("AMP"),
            "MTD": check("MTD"),
            "RESCATE": tr.cells[6].querySelector('input').checked ? "SI" : "NO",
            "MEDICACIÓN": tr.cells[7].querySelector('input').checked ? "SI" : "NO",
            "RIESGO": tr.cells[8].querySelector('select').value
        };
    });

    // 2. Obtener IDs de usuario presentes en pantalla
    const idsUsuario = filasDOM
        .map(tr => tr.cells[0].querySelector(".paciente-idusuario")?.value || "")
        .filter(Boolean);

    if (idsUsuario.length === 0) {
        alert("No hay ID_USUARIO válidos para guardar.");
        return;
    }

    // 3. Obtener IDs reales de pacientes en una sola llamada
    const { data: pacientes, error: errorPac } = await client
        .from("pacientes")
        .select('id, "ID_USUARIO"')
        .in("ID_USUARIO", idsUsuario);

    if (errorPac) {
        alert("Error obteniendo IDs de pacientes");
        console.error(errorPac);
        return;
    }

    // 4. Crear diccionario ID_USUARIO -> id
    const mapaPacientes = {};
    (pacientes || []).forEach(p => {
        mapaPacientes[p.ID_USUARIO] = p.id;
    });

    // 5. Preparar registros para inserción masiva
    const registros = data.map((fila, index) => {
        const tr = filasDOM[index];
        const idUsuario = tr.cells[0].querySelector(".paciente-idusuario")?.value || "";

        return {
            fecha: fISO,
            paciente_id: mapaPacientes[idUsuario] || null,
            ID_USUARIO: idUsuario,
            asistencia: fila.ASISTENCIA,
            mañana: fila.MAÑANA === "SI",
            tarde: fila.TARDE === "SI",
            control: fila.CONTROL === "SI",
            sustancias: {
                COC: fila.COC,
                OH: fila.OH,
                THC: fila.THC,
                BZD: fila.BZD,
                OPI: fila.OPI,
                KETA: fila.KETA,
                AMP: fila.AMP,
                MTD: fila.MTD
            },
            rescate: fila.RESCATE === "SI",
            medicacion: fila["MEDICACIÓN"] === "SI",
            riesgo: fila.RIESGO,
            observaciones: document.getElementById("observaciones")?.value || ""
        };
    });

    // 6. Insertar todo en Supabase
    const { error: errorInsert } = await client
        .from("registros_diarios")
        .insert(registros);

    if (errorInsert) {
        alert("Error guardando registros en Supabase");
        console.error(errorInsert);
        return;
    }

 

    // 8. Exportar Excel compatible con Android / Samsung
    try {
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Tesis");

        const excelBuffer = XLSX.write(wb, {
            bookType: "xlsx",
            type: "array"
        });

        const blob = new Blob([excelBuffer], {
            type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
        });

        saveAs(blob, `Registro_${fISO}.xlsx`);
    } catch (e) {
        console.error("Error generando o descargando Excel:", e);
        alert("Los datos se han guardado, pero hubo un problema al generar el Excel.");
        return;
    }

    // 9. Preguntar si limpiar pantalla
    setTimeout(() => {
        if (confirm("¿Finalizar día y limpiar pantalla?")) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    }, 700);
}
