    h3 {

      margin-top: 0;
    }

    .card {

      border-radius: 8px;
      border: 1px solid #ddd;

    }

      font-size: 14px;

    }

      margin-bottom: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;

    }

    .consumo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));

      padding: 14px;
      border: none;
      border-radius: 6px;
      width: 100%;
      font-size: 16px;
      font-weight: 700;

  <script>
    const SUPABASE_URL = "https://gqyqpdcavqgcyaoidulj.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxeXFwZGNhdnFnY3lhb2lkdWxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5Nzk5MzIsImV4cCI6MjA4NDU1NTkzMn0.nHu3OIS8S20thJxUmVVybb7Ox5B2qkhv7qxc1X2Va7g";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const MAP_PROBLEMATICA = {
      E: 1, F: 2, G: 3, H: 4, I: 5,
      J: 6, K: 7, L: 8, M: 9, N: 10
    };

    const COMO = `
      <option value="">-</option>
      <option value="1">Oral</option>
      <option value="2">Inhalada</option>
      <option value="3">Fumada</option>
      <option value="4">Inyectada</option>
      <option value="5">Conductual</option>
    `;

    const FRE = `
      <option value="">-</option>
      <option value="0">No</option>
      <option value="1">1-3/mes</option>
      <option value="2">1-2/sem</option>
      <option value="3">3-6/sem</option>
      <option value="4">Diario</option>
    `;

    function bloqueConsumo(nombre, letra) {
      return `
        <div class="consumo-card">
          <h4>${nombre}</h4>

          <label for="${letra}1">${letra}1 Fecha inicio</label>
          <input id="${letra}1" type="date">

          <label for="${letra}2">${letra}2 Fecha fin</label>
          <input id="${letra}2" type="date">

          <label for="${letra}3">${letra}3 Modo</label>
          <select id="${letra}3">${COMO}</select>

          <label for="${letra}4">${letra}4 Frecuencia</label>
          <select id="${letra}4">${FRE}</select>
        </div>
      `;
    }

    function renderizarBloquesConsumo() {
      document.getElementById("consumo").innerHTML =
        bloqueConsumo("THC", "E") +
        bloqueConsumo("ALCOHOL", "F") +
        bloqueConsumo("COCAÍNA", "G") +
        bloqueConsumo("OPIÁCEOS", "H") +
        bloqueConsumo("KETAMINA", "I") +
        bloqueConsumo("BZD", "J") +
        bloqueConsumo("MDMA", "K") +
        bloqueConsumo("LUDOPATÍA", "L") +
        bloqueConsumo("SEXO", "M") +
        bloqueConsumo("OTRAS", "N");
    }

    async function poblarSelectPacientes() {
      const select = document.getElementById("Z_nombre");
      const inputIdUsuario = document.getElementById("Z1");

      if (!select) return;

      const { data, error } = await client
        .from("pacientes")
        .select('nombre, "ID_USUARIO"')
        .eq("activo", true)
        .order("nombre", { ascending: true });

      if (error) {
        console.error("Error cargando pacientes:", error);
        return;
      }

      select.innerHTML = '<option value="">Selecciona paciente</option>';

      (data || []).forEach(p => {
        const option = document.createElement("option");
        option.value = p.ID_USUARIO;
        option.textContent = p.nombre;
        select.appendChild(option);
      });

      select.onchange = () => {
        inputIdUsuario.value = select.value || "";
      };
    }

    function val(v) {
      return v === "" ? null : v;
    }

    function freq(v) {
      return v === "" ? 0 : Number(v);
    }

    function construirRegistro(d) {
      return {
        ID_USUARIO: d.Z1 || null,
        fecha: d.Z3 || null,

        A1: val(d.A1), A2: val(d.A2), A3: val(d.A3), A4: val(d.A4), A5: val(d.A5),
        A6: val(d.A6), A7: val(d.A7), A8: val(d.A8), A9: val(d.A9), A10: val(d.A10),
        A11: val(d.A11), A12: val(d.A12), A13: val(d.A13), A14: val(d.A14),
        A15: val(d.A15), A16: val(d.A16), A17: val(d.A17),

        B1: val(d.B1), B2: val(d.B2), B3: val(d.B3), B4: val(d.B4), B5: val(d.B5),
        B6: val(d.B6), B7: val(d.B7), B8: val(d.B8), B9: val(d.B9),
        B10: val(d.B10), B11: val(d.B11), B12: val(d.B12),

        D1: val(d.D1), D2: val(d.D2), D3: val(d.D3), D4: val(d.D4),
        D5: val(d.D5), D6: val(d.D6), D7: val(d.D7), D8: val(d.D8),

        THC_inicio: val(d.E1), THC_fin: val(d.E2), THC_modo: val(d.E3), THC_freq: freq(d.E4),
        OH_inicio: val(d.F1), OH_fin: val(d.F2), OH_modo: val(d.F3), OH_freq: freq(d.F4),
        COC_inicio: val(d.G1), COC_fin: val(d.G2), COC_modo: val(d.G3), COC_freq: freq(d.G4),
        OP_inicio: val(d.H1), OP_fin: val(d.H2), OP_modo: val(d.H3), OP_freq: freq(d.H4),
        KETA_inicio: val(d.I1), KETA_fin: val(d.I2), KETA_modo: val(d.I3), KETA_freq: freq(d.I4),
        BZD_inicio: val(d.J1), BZD_fin: val(d.J2), BZD_modo: val(d.J3), BZD_freq: freq(d.J4),
        MDMA_inicio: val(d.K1), MDMA_fin: val(d.K2), MDMA_modo: val(d.K3), MDMA_freq: freq(d.K4),
        LUDO_inicio: val(d.L1), LUDO_fin: val(d.L2), LUDO_modo: val(d.L3), LUDO_freq: freq(d.L4),
        SEX_inicio: val(d.M1), SEX_fin: val(d.M2), SEX_modo: val(d.M3), SEX_freq: freq(d.M4),
        OTRAS_inicio: val(d.N1), OTRAS_fin: val(d.N2), OTRAS_modo: val(d.N3), OTRAS_freq: freq(d.N4),

        O1: MAP_PROBLEMATICA[d.O1] || null,
        O2: MAP_PROBLEMATICA[d.O2] || null,
        O3: MAP_PROBLEMATICA[d.O3] || null
      };
    }

    function exportarExcelSECE(registro) {
      const ws = XLSX.utils.json_to_sheet([registro]);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "SECE");

      const idUsuario = registro.ID_USUARIO || "sin_id";
      const fecha = registro.fecha || "sin_fecha";

      XLSX.writeFile(wb, `SECE_${idUsuario}_${fecha}.xlsx`);
    }

    function limpiarFormularioSECE() {
      document.querySelectorAll("input").forEach(i => {
        if (i.id === "Z1") {
          i.value = "";
          return;
        }
        if (i.type === "date" || i.type === "text") {
          i.value = "";
        }
      });

      document.querySelectorAll("select").forEach(s => {
        s.selectedIndex = 0;
      });
    }

    async function guardar() {
      const btn = document.getElementById("btnGuardar");
      const d = {};

      document.querySelectorAll("input,select").forEach(e => {
        if (e.id) d[e.id] = e.value;
      });

      if (!d.Z1) {
        alert("Selecciona paciente");
        return;
      }

      const registro = construirRegistro(d);

      try {
        btn.disabled = true;
        btn.textContent = "Guardando...";

        const { error } = await client
          .from("sece")
          .insert([registro]);

        if (error) {
          alert(error.message);
          return;
        }

        exportarExcelSECE(registro);
        limpiarFormularioSECE();
        alert("OK");
      } finally {
        btn.disabled = false;
        btn.textContent = "Guardar";
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      renderizarBloquesConsumo();
      await poblarSelectPacientes();
    });
  </script>
</body>
</html>
