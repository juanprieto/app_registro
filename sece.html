<!-- O -->
<div class="card">
<h3>Sustancias problemáticas</h3>

<select id="O1">
<option value="">-</option>

</select>

<select id="O2">…igual…</select>
<select id="O3">…igual…</select>

<button onclick="guardar()">Guardar</button>

<script>

// ================= CONFIG =================
const SUPABASE_URL = "https://gqyqpdcavqgcyaoidulj.supabase.co";
const SUPABASE_KEY = "TU_KEY_AQUI";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ================= MAP =================
const MAP_PROBLEMATICA = {E:1,F:2,G:3,H:4,I:5,J:6,K:7,L:8,M:9,N:10};

// ================= UI =================
const COMO=`<option value="">-</option><option value="1">Oral</option><option value="5">Conductual</option>`;
const FRE=`<option value="">-</option><option value="0">No</option><option value="4">Diario</option>`;

function bloque(n,l){
return `<div class="consumo-card">
<h4>${n}</h4>
<input id="${l}1" type="date">
<input id="${l}2" type="date">
<select id="${l}3">${COMO}</select>
<select id="${l}4">${FRE}</select>
</div>`;
}

// ================= PACIENTES =================
async function poblarSelectPacientes(){
const s=document.getElementById("Z_nombre");
const i=document.getElementById("Z1");

const {data}=await client.from("pacientes")
.select('nombre,"ID_USUARIO"').eq("activo",true).order("nombre");

s.innerHTML='<option value="">Selecciona paciente</option>';

data.forEach(p=>{
const o=document.createElement("option");
o.value=p.ID_USUARIO;
o.textContent=p.nombre;
s.appendChild(o);
});

s.onchange=()=>i.value=s.value||"";
}

// ================= HELPERS =================
const v=x=>x===""?null:x;
const f=x=>x===""?0:Number(x);

// ================= REGISTRO =================
function construir(d){
return{
ID_USUARIO:d.Z1||null,
fecha:d.Z3||null,

THC_inicio:v(d.E1),THC_fin:v(d.E2),THC_modo:v(d.E3),THC_freq:f(d.E4),
SEX_inicio:v(d.M1),SEX_fin:v(d.M2),SEX_modo:v(d.M3),SEX_freq:f(d.M4),

O1:MAP_PROBLEMATICA[d.O1]||null,
O2:MAP_PROBLEMATICA[d.O2]||null,
O3:MAP_PROBLEMATICA[d.O3]||null
};
}

// ================= EXCEL =================
function excel(r){
const ws=XLSX.utils.json_to_sheet([r]);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"SECE");
XLSX.writeFile(wb,`SECE_${r.ID_USUARIO}.xlsx`);
}

// ================= GUARDAR =================
async function guardar(){
const d={};
document.querySelectorAll("input,select").forEach(e=>d[e.id]=e.value);

if(!d.Z1)return alert("Selecciona paciente");

const r=construir(d);

const {error}=await client.from("sece").insert([r]);

if(error)return alert(error.message);

excel(r);
document.querySelectorAll("input").forEach(i=>i.value="");
document.querySelectorAll("select").forEach(s=>s.selectedIndex=0);

alert("OK");
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded",()=>{
document.getElementById("consumo").innerHTML=
bloque("THC","E")+bloque("SEXO","M")+bloque("OTRAS","N");

poblarSelectPacientes();
});

</script>
