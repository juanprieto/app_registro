<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SECE</title>
  <link rel="icon" type="image/png" href="logo.png">

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      max-width: 1100px;
      margin: auto;
      background: #f8f9fa;
      padding: 10px;
    }

    h1 {
      text-align: center;
      color: rgb(167, 188, 75);
      border-bottom: 2px solid rgb(167, 188, 75);
      padding-bottom: 8px;
    }

    h3 {
      color: rgb(167, 188, 75);
      margin-top: 0;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 15px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      display: block;
      margin-top: 8px;
    }

    input, select {
      width: 100%;
      padding: 7px;
      margin-bottom: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .consumo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }

    .consumo-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
    }

    .consumo-card h4 {
      color: rgb(167, 188, 75);
      margin-top: 0;
      margin-bottom: 10px;
    }

    button {
      background: rgb(167, 188, 75);
      color: white;
      padding: 14px;
      border: none;
      border-radius: 6px;
      width: 100%;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <button id="btnGuardar" onclick="guardar()">Guardar</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
   
    const SUPABASE_URL = "https://gqyqpdcavqgcyaoidulj.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxeXFwZGNhdnFnY3lhb2lkdWxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5Nzk5MzIsImV4cCI6MjA4NDU1NTkzMn0.nHu3OIS8S20thJxUmVVybb7Ox5B2qkhv7qxc1X2Va7g";

    
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const COMO = `
      <option value="">-</option>
      <option value="1">Oral</option>
      <option value="2">Inhalada</option>
      <option value="3">Fumada</option>
      <option value="4">Inyectada</option>
      <option value="5">Conductual</option>
    `;

    const FRE = `
      <option value="">-</option>
      <option value="0">No</option>
      <option value="1">1-3/mes</option>
      <option value="2">1-2/sem</option>
      <option value="3">3-6/sem</option>
      <option value="4">Diario</option>
    `;

    const MAP_PROBLEMATICA = {
      E: 1,
      F: 2,
      G: 3,
      H: 4,
      I: 5,
      J: 6,
      K: 7,
      L: 8,
      M: 9,
      N: 10
    };

    function bloqueConsumo(nombre, letra) {
      return `
        <div class="consumo-card">
          <h4>${nombre}</h4>
          <label for="${letra}1">${letra}1</label>
          <input id="${letra}1" type="date">

          <label for="${letra}2">${letra}2</label>
          <input id="${letra}2" type="date">

          <label for="${letra}3">${letra}3</label>
          <select id="${letra}3">${COMO}</select>

          <label for="${letra}4">${letra}4</label>
          <select id="${letra}4">${FRE}</select>
        </div>
      `;
    }

    function renderizarBloquesConsumo() {
      document.getElementById("consumo").innerHTML =
        bloqueConsumo("THC", "E") +
        bloqueConsumo("ALCOHOL", "F") +
        bloqueConsumo("COCAÍNA", "G") +
        bloqueConsumo("OPIÁCEOS", "H") +
        bloqueConsumo("KETAMINA", "I") +
        bloqueConsumo("BZD", "J") +
        bloqueConsumo("MDMA", "K") +
        bloqueConsumo("LUDOPATÍA", "L") +
        bloqueConsumo("SEXO", "M") +
        bloqueConsumo("OTRAS", "N");
    }

    async function cargarPacientesActivos() {
      const { data, error } = await client
        .from("pacientes")
        .select('nombre, "ID_USUARIO"')
        .eq("activo", true)
        .order("nombre", { ascending: true });

      if (error) {
        console.error("Error cargando pacientes:", error);
        return [];
      }

      return data || [];
    }

   
    function recogerFormulario() {
      const datos = {};
      document.querySelectorAll("input, select").forEach(el => {
        if (el.id) datos[el.id] = el.value;
      });
      return datos;
    }
async function poblarSelectPacientes() {
  const select = document.getElementById("Z_nombre");
  const inputIdUsuario = document.getElementById("Z1");

  if (!select) return;

  const { data, error } = await client
    .from("pacientes")
    .select('nombre, "ID_USUARIO"')
    .eq("activo", true)
    .order("nombre", { ascending: true });

  if (error) {
    console.error("Error cargando pacientes:", error);
    return;
  }

  select.innerHTML = '<option value="">Selecciona paciente</option>';

  (data || []).forEach(p => {
    const option = document.createElement("option");
    option.value = p.ID_USUARIO;
    option.textContent = p.nombre;
    select.appendChild(option);
  });

  select.addEventListener("change", () => {
    inputIdUsuario.value = select.value || "";
  });
}
    function construirRegistro(d) {
  return {
    "ID_USUARIO": d.Z1 || null,
    fecha: d.Z3 || null,

    A1: d.A1 || null,
    A2: d.A2 || null,
    A3: d.A3 || null,
    A4: d.A4 || null,
    A5: d.A5 || null,
    A6: d.A6 || null,
    A7: d.A7 || null,
    A8: d.A8 || null,
    A9: d.A9 || null,
    A10: d.A10 || null,
    A11: d.A11 || null,
    A12: d.A12 || null,
    A13: d.A13 || null,
    A14: d.A14 || null,
    A15: d.A15 || null,
    A16: d.A16 || null,
    A17: d.A17 || null,

    B1: d.B1 || null,
    B2: d.B2 || null,
    B3: d.B3 || null,
    B4: d.B4 || null,
    B5: d.B5 || null,
    B6: d.B6 || null,
    B7: d.B7 || null,
    B8: d.B8 || null,
    B9: d.B9 || null,
    B10: d.B10 || null,
    B11: d.B11 || null,
    B12: d.B12 || null,

    D1: d.D1 || null,
    D2: d.D2 || null,
    D3: d.D3 || null,
    D4: d.D4 || null,
    D5: d.D5 || null,
    D6: d.D6 || null,
    D7: d.D7 || null,
    D8: d.D8 || null,

    THC_inicio: d.E1 || null,
    THC_fin: d.E2 || null,
    THC_modo: d.E3 || null,
    THC_freq: d.E4 === "" ? 0 : Number(d.E4),

    OH_inicio: d.F1 || null,
    OH_fin: d.F2 || null,
    OH_modo: d.F3 || null,
    OH_freq: d.F4 === "" ? 0 : Number(d.F4),

    COC_inicio: d.G1 || null,
    COC_fin: d.G2 || null,
    COC_modo: d.G3 || null,
    COC_freq: d.G4 === "" ? 0 : Number(d.G4),

    OP_inicio: d.H1 || null,
    OP_fin: d.H2 || null,
    OP_modo: d.H3 || null,
    OP_freq: d.H4 === "" ? 0 : Number(d.H4),

    KETA_inicio: d.I1 || null,
    KETA_fin: d.I2 || null,
    KETA_modo: d.I3 || null,
    KETA_freq: d.I4 === "" ? 0 : Number(d.I4),

    BZD_inicio: d.J1 || null,
    BZD_fin: d.J2 || null,
    BZD_modo: d.J3 || null,
    BZD_freq: d.J4 === "" ? 0 : Number(d.J4),

    MDMA_inicio: d.K1 || null,
    MDMA_fin: d.K2 || null,
    MDMA_modo: d.K3 || null,
    MDMA_freq: d.K4 === "" ? 0 : Number(d.K4),

    LUDO_inicio: d.L1 || null,
    LUDO_fin: d.L2 || null,
    LUDO_modo: d.L3 || null,
    LUDO_freq: d.L4 === "" ? 0 : Number(d.L4),

    SEX_inicio: d.M1 || null,
    SEX_fin: d.M2 || null,
    SEX_modo: d.M3 || null,
    SEX_freq: d.M4 === "" ? 0 : Number(d.M4),

    OTRAS_inicio: d.N1 || null,
    OTRAS_fin: d.N2 || null,
    OTRAS_modo: d.N3 || null,
    OTRAS_freq: d.N4 === "" ? 0 : Number(d.N4),

    O1: MAP_PROBLEMATICA[d.O1] || null,
    O2: MAP_PROBLEMATICA[d.O2] || null,
    O3: MAP_PROBLEMATICA[d.O3] || null
  };
}

    async function guardar() {
      const btn = document.getElementById("btnGuardar");
      const d = recogerFormulario();

      if (!d.Z1) {
        alert("Debes seleccionar un paciente antes de guardar");
        return;
      }

      const registro = construirRegistro(d);

      try {
        btn.disabled = true;
        btn.textContent = "Guardando...";

        const { data, error } = await client
          .from("sece")
          .insert([registro])
          .select();

        if (error) {
          console.error("Error guardando SECE:", error);
          alert("Error guardando: " + error.message);
          return;
        }

        alert("Guardado correctamente. Filas insertadas: " + (data?.length || 0));
      } finally {
        btn.disabled = false;
        btn.textContent = "Guardar";
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      renderizarBloquesConsumo();
      await poblarSelectPacientes();
    });
  </script>
</body>
</html>
