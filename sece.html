function b(n,l){return `<div class="consumo-card"><h4>${n}</h4>
<label>${l}1</label><input id="${l}1" type="date">

<label>${l}4</label><select id="${l}4">${FRE}</select></div>`;}

document.getElementById("consumo").innerHTML=
b("THC","E")+b("ALCOHOL","F")+b("COCAÍNA","G")+b("OPIÁCEOS","H")+b("KETAMINA","I")+b("BZD","J")+b("MDMA","K")+b("LUDOPATÍA","L")+b("SEXO","M")+b("OTRAS","N");
</script>

<button onclick="guardar()">Guardar</button>

  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://gqyqpdcavqgcyaoidulj.supabase.co";
const SUPABASE_KEY = "TU_ANON_KEY_AQUI";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  async function cargarPacientesActivos() {
    const { data, error } = await client
        .from("pacientes")
        .select('nombre, "ID_USUARIO"')
        .eq("activo", true)
        .order("nombre", { ascending: true });

    if (error) {
        console.error("Error cargando pacientes:", error);
        return [];
    }

    return data || [];
}

async function poblarSelectPacientesSECE() {
    const select = document.getElementById("Z_nombre");
    const inputIdUsuario = document.getElementById("Z1");

    const pacientes = await cargarPacientesActivos();

    select.innerHTML = '<option value=""></option>';

    pacientes.forEach(p => {
        const option = document.createElement("option");
        option.value = p.ID_USUARIO;
        option.textContent = p.nombre;
        select.appendChild(option);
    });

    select.addEventListener("change", () => {
        inputIdUsuario.value = select.value || "";
    });
}
</script>
<script>

async function guardar() {
    const d = {};

    document.querySelectorAll("input,select").forEach(e => {
        if (e.id) d[e.id] = e.value;
    });

    const registro = {
        "ID_USUARIO": d.Z1 || null,
        fecha: d.Z3 || null,

        A1: d.A1 || null,
        A2: d.A2 || null,
        A3: d.A3 || null,
        A4: d.A4 || null,
        A5: d.A5 || null,
        A6: d.A6 || null,
        A7: d.A7 || null,
        A8: d.A8 || null,
        A9: d.A9 || null,

        A11: d.A11 || null,
        A12: d.A12 || null,
        A13: d.A13 || null,
        A14: d.A14 || null,
        A15: d.A15 || null,
        A16: d.A16 || null,
        A17: d.A17 || null,

        B1: d.B1 || null,
        B2: d.B2 || null,
        B3: d.B3 || null,
        B4: d.B4 || null,
        B5: d.B5 || null,
        B6: d.B6 || null,
        B7: d.B7 || null,
        B8: d.B8 || null,
        B9: d.B9 || null,
        B10: d.B10 || null,
        B11: d.B11 || null,
        B12: d.B12 || null,

        THC_inicio: d.E1 || null,
        THC_fin: d.E2 || null,
        THC_modo: d.E3 || null,

        OH_inicio: d.F1 || null,

        COC_inicio: d.G1 || null,

        OP_inicio: d.H1 || null,

        KETA_modo: d.I3 || null,
        KETA_freq: d.I4 || null
    };

   const { data, error } = await client
    .from("sece")
    .insert([registro])
    .select();

console.log("INSERT SECE data:", data);
console.log("INSERT SECE error:", error);

if (error) {
    console.error("Error guardando SECE:", error);
    alert("Error guardando: " + error.message);
    return;
}

alert("Guardado correctamente. Filas insertadas: " + (data?.length || 0));
}

    poblarSelectPacientesSECE();
});

</script>
