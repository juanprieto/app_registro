<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SECE · Visualizador VW</title>

  <link rel="icon" href="data:,">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#d9deea;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#2563eb;
      --soft:#eef2ff;
      --soft-text:#1e3a8a;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1280px;
      margin:24px auto;
      padding:0 16px;
    }

    h1{
      margin:0 0 16px;
      font-size:24px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
      margin-bottom:16px;
    }
    

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap:12px;
    }

    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
      font-weight:700;
    }

    select, input, button{
      width:100%;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      font-size:14px;
    }

    button{
      cursor:pointer;
      background:var(--accent);
      color:#fff;
      border:none;
      font-weight:700;
    }

    button.secondary{
      background:#eef2ff;
      color:#1e3a8a;
      border:1px solid #c7d2fe;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:end;
      margin-top:12px;
    }

    .row > div{
      flex:1 1 220px;
    }

    .meta{
      font-size:13px;
      color:var(--muted);
      margin-top:8px;
    }

    .status{
      font-size:13px;
      color:var(--muted);
      margin-top:8px;
      white-space:pre-wrap;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:12px;
      margin-top:12px;
      background:#fff;
      max-height:600px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      text-align:left;
      font-size:13px;
      white-space:nowrap;
    }

    th{
      background:#f8fafc;
      position:sticky;
      top:0;
      z-index:1;
    }

    canvas{
      width:100% !important;
      max-height:420px;
    }

    #patientChips{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:8px;
      min-height:20px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      background:var(--soft);
      color:var(--soft-text);
      font-size:13px;
    }

    .chip button{
      border:none;
      background:transparent;
      color:var(--soft-text);
      cursor:pointer;
      width:auto;
      padding:0;
      font-size:16px;
      line-height:1;
    }
.full-width{
  grid-column: 1 / -1;
}
    #patientOptions{
      border:1px solid var(--line);
      border-radius:10px;
      max-height:180px;
      overflow:auto;
      margin-top:8px;
      background:#fff;
    }

    .patient-option{
      padding:8px 10px;
      cursor:pointer;
      border-bottom:1px solid #eef2f7;
    }

    .patient-option:hover{
      background:#f8fafc;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Visualizador de vistas SECE</h1>

    <div class="card">
      <div class="grid">
        <div>
          <label for="viewSelect">Vista</label>
          <select id="viewSelect"></select>
        </div>

        <div class="full-width">
  <label for="patientSearch">Paciente</label>
  <input id="patientSearch" type="text" placeholder="Buscar paciente..." />
  <div id="patientChips"></div>
  <div id="patientOptions"></div>
</div>

        <div>
          <label for="variableSelect">Variable Y</label>
          <select id="variableSelect">
            <option value="">Selecciona una variable</option>
          </select>
        </div>

        <div>
          <label for="xVariableSelect">Variable eje X</label>
          <select id="xVariableSelect">
            <option value="">Automática</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div>
          <label for="searchInput">Filtro texto libre</label>
          <input id="searchInput" type="text" placeholder="Buscar en filas cargadas" />
        </div>

        <div>
          <label>&nbsp;</label>
          <button id="loadBtn" type="button">Cargar datos</button>
        </div>

        <div>
          <label>&nbsp;</label>
          <button id="clearBtn" type="button" class="secondary">Limpiar filtros</button>
        </div>
      </div>

      <div id="status" class="status">Listo.</div>
    </div>

    <div class="card" id="chartCard" style="display:none;">
  <canvas id="chart"></canvas>
  <div id="meta" class="meta"></div>
</div>

    <div class="card">
      <div class="table-wrap">
        <table id="dataTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // =========================
    // CONFIG
    // =========================
    const SUPABASE_URL = "https://gqyqpdcavqgcyaoidulj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxeXFwZGNhdnFnY3lhb2lkdWxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5Nzk5MzIsImV4cCI6MjA4NDU1NTkzMn0.nHu3OIS8S20thJxUmVVybb7Ox5B2qkhv7qxc1X2Va7g";


    const VIEWS = [
      "vw_sece_a_proporcion",
      "vw_sece_c_conciencia",
      "vw_sece_c_economica",
      "vw_sece_c_educativo_laboral",
      "vw_sece_c_sociodemo",
      "vw_sece_carga_ajustada",
      "vw_sece_cargas_base",
      "vw_sece_clinico",
      "vw_sece_cronicidad",
      "vw_sece_precocidad",
      "vw_sece_sub_a",
      "vw_sece_sub_c",
      "vw_sece_vpr"
    ];

    // Un solo cliente
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // =========================
    // STATE
    // =========================
    let currentRows = [];
    let currentChart = null;
    let selectedPatients = [];
    let allPatients = [];

    // =========================
    // ELEMENTS
    // =========================
    const viewSelect = document.getElementById("viewSelect");
    const patientSearch = document.getElementById("patientSearch");
    const patientChips = document.getElementById("patientChips");
    const patientOptions = document.getElementById("patientOptions");
    const variableSelect = document.getElementById("variableSelect");
    const xVariableSelect = document.getElementById("xVariableSelect");
    const searchInput = document.getElementById("searchInput");
    const loadBtn = document.getElementById("loadBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");
    const metaEl = document.getElementById("meta"); const chartCard = document.getElementById("chartCard");
    const tableHead = document.querySelector("#dataTable thead");
    const tableBody = document.querySelector("#dataTable tbody");

    // =========================
    // HELPERS
    // =========================
    function setStatus(text){
      statusEl.textContent = text;
    }

    function uniqueSorted(arr){
      return [...new Set(arr.filter(v => v !== null && v !== undefined && v !== ""))]
        .sort((a,b) => String(a).localeCompare(String(b), "es"));
    }

    function detectIdColumn(row){
      if (!row) return null;
      const keys = Object.keys(row);
      const candidates = ["ID_USUARIO", "id_usuario", "usuario_id", "user_id"];
      return candidates.find(c => keys.includes(c)) || null;
    }

    function detectPatientColumn(row){
      if (!row) return null;
      const keys = Object.keys(row);
      const candidates = ["nombre", "paciente", "NOMBRE", "Paciente"];
      return candidates.find(c => keys.includes(c)) || null;
    }

    function detectDateColumn(row){
      if (!row) return null;
      const keys = Object.keys(row);
      const candidates = ["fecha", "FECHA", "date", "created_at"];
      return candidates.find(c => keys.includes(c)) || null;
    }

    function getNumericColumns(rows){
      if (!rows.length) return [];

      const keys = Object.keys(rows[0]);

      return keys.filter(key => {
        if ([
          "id",
          "ID_USUARIO",
          "id_usuario",
          "nombre",
          "paciente",
          "fecha",
          "created_at"
        ].includes(key)) return false;

        const sample = rows
          .map(r => r[key])
          .filter(v => v !== null && v !== undefined && v !== "")
          .slice(0, 20);

        if (!sample.length) return false;

        return sample.every(v => !isNaN(Number(v)));
      });
    }

    function getAllColumns(rows){
      if (!rows.length) return [];
      return Object.keys(rows[0]).filter(col => col !== "id");
    }

    function populateSelect(selectEl, values, firstLabel){
      selectEl.innerHTML = "";

      const first = document.createElement("option");
      first.value = "";
      first.textContent = firstLabel;
      selectEl.appendChild(first);

      values.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        selectEl.appendChild(opt);
      });
    }

    function orderColumns(cols){
      const preferredOrder = [
        "nombre",
        "ID_USUARIO",
        "id_usuario",
        "fecha",
        "paciente"
      ];

      const preferred = preferredOrder.filter(col => cols.includes(col));
      const rest = cols
        .filter(col => !preferredOrder.includes(col))
        .sort((a, b) => a.localeCompare(b, "es"));

      return [...preferred, ...rest];
    }

    function renderTable(rows){
      tableHead.innerHTML = "";
      tableBody.innerHTML = "";

      if (!rows.length) return;

      const cols = orderColumns(
        Object.keys(rows[0]).filter(col => col !== "id")
      );

      const trHead = document.createElement("tr");
      cols.forEach(col => {
        const th = document.createElement("th");
        th.textContent = col;
        trHead.appendChild(th);
      });
      tableHead.appendChild(trHead);

      rows.forEach(row => {
        const tr = document.createElement("tr");
        cols.forEach(col => {
          const td = document.createElement("td");
          td.textContent = row[col] ?? "";
          tr.appendChild(td);
        });
        tableBody.appendChild(tr);
      });
    }

    function renderPatientChips() {
      patientChips.innerHTML = "";

      selectedPatients.forEach(name => {
        const chip = document.createElement("div");
        chip.className = "chip";

        const text = document.createElement("span");
        text.textContent = name;

        const close = document.createElement("button");
        close.textContent = "×";
        close.type = "button";
        close.onclick = () => {
          selectedPatients = selectedPatients.filter(p => p !== name);
          renderPatientChips();
          renderPatientOptions(patientSearch.value.trim());
          refreshLocalView();
        };

        chip.appendChild(text);
        chip.appendChild(close);
        patientChips.appendChild(chip);
      });
    }

    function renderPatientOptions(query = "") {
      patientOptions.innerHTML = "";

      const normalized = query.toLowerCase();

      const visible = allPatients.filter(name =>
        !selectedPatients.includes(name) &&
        (!normalized || String(name).toLowerCase().includes(normalized))
      );

      visible.slice(0, 50).forEach(name => {
        const row = document.createElement("div");
        row.className = "patient-option";
        row.textContent = name;
        row.onclick = () => {
          selectedPatients.push(name);
          selectedPatients = [...new Set(selectedPatients)].sort((a,b) => a.localeCompare(b, "es"));
          patientSearch.value = "";
          renderPatientChips();
          renderPatientOptions("");
          refreshLocalView();
        };
        patientOptions.appendChild(row);
      });
    }

    function applyLocalFilters(rows){
      if (!rows.length) return [];

      const patientCol = detectPatientColumn(rows[0]);

      let out = [...rows];

      if (selectedPatients.length && patientCol){
        out = out.filter(r => selectedPatients.includes(String(r[patientCol])));
      }

      if (searchInput.value.trim()){
        const q = searchInput.value.trim().toLowerCase();
        out = out.filter(r =>
          Object.values(r).some(v => String(v ?? "").toLowerCase().includes(q))
        );
      }

      return out;
    }

    function buildChart(rows){
     
      if (!rows.length){
  chartCard.style.display = "none";
  metaEl.textContent = "";
  if (currentChart) currentChart.destroy();
  return;
}

const yVariable = variableSelect.value;
if (!yVariable){
  chartCard.style.display = "none";
  metaEl.textContent = "";
  if (currentChart) currentChart.destroy();
  return;
}

chartCard.style.display = "block";

      const autoDateCol = detectDateColumn(rows[0]);
      const autoIdCol = detectIdColumn(rows[0]);
      const autoPatientCol = detectPatientColumn(rows[0]);

      const selectedX = xVariableSelect.value;
      const xCol = selectedX || autoDateCol || autoPatientCol || autoIdCol;

      let chartRows = rows
        .filter(r =>
          r[yVariable] !== null &&
          r[yVariable] !== undefined &&
          r[yVariable] !== "" &&
          !isNaN(Number(r[yVariable]))
        )
        .map(r => ({
          label: xCol ? String(r[xCol] ?? "") : "fila",
          value: Number(r[yVariable])
        }));

      chartRows = chartRows.slice(0, 200);

      if (currentChart) currentChart.destroy();

      const ctx = document.getElementById("chart");

      currentChart = new Chart(ctx, {
        type: (xCol && xCol.toLowerCase().includes("fecha")) ? "line" : "bar",
        data: {
          labels: chartRows.map(r => r.label),
          datasets: [{
            label: yVariable,
            data: chartRows.map(r => r.value)
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: true }
          },
          scales: {
            y: { beginAtZero: false }
          }
        }
      });

      metaEl.textContent =
        `Filas graficadas: ${chartRows.length} · Eje X: ${xCol || "automático"} · Eje Y: ${yVariable}`;
    }

    async function loadPatientsMap() {
      const { data, error } = await sb
        .schema("public")
        .from("pacientes")
        .select("ID_USUARIO, nombre");

      if (error) {
        console.error("Error cargando pacientes:", error);
        return new Map();
      }

      const map = new Map();

      (data || []).forEach(row => {
        if (row.ID_USUARIO) {
          map.set(String(row.ID_USUARIO), row.nombre || "");
        }
      });

      return map;
    }

    async function loadViewData(){
      const viewName = viewSelect.value;

      if (!viewName){
        setStatus("Selecciona una vista.");
        return;
      }

      setStatus(`Cargando ${viewName}...`);

      const { data, error } = await sb
        .schema("tesis_views")
        .from(viewName)
        .select("*")
        .limit(1000);

      if (error){
        setStatus(`Error al cargar ${viewName}: ${error.message}`);
        console.error(error);
        return;
      }

      const patientsMap = await loadPatientsMap();

      currentRows = (data || []).map(row => {
        const idUsuario = row.ID_USUARIO ?? row.id_usuario ?? "";
        return {
          ...row,
          nombre: patientsMap.get(String(idUsuario)) || ""
        };
      });

      if (!currentRows.length){
        setStatus(`La vista ${viewName} no devolvió filas.`);
        variableSelect.innerHTML = `<option value="">Sin variables</option>`;
        xVariableSelect.innerHTML = `<option value="">Automática</option>`;
        renderTable([]);
        if (currentChart) currentChart.destroy();
        metaEl.textContent = "";
        allPatients = [];
        selectedPatients = [];
        renderPatientChips();
        renderPatientOptions("");
        chartCard.style.display = "none";
        return;
      }

      const firstRow = currentRows[0];
      const patientCol = detectPatientColumn(firstRow);
      const numericCols = getNumericColumns(currentRows);
      const allCols = getAllColumns(currentRows);

      if (patientCol){
        allPatients = uniqueSorted(currentRows.map(r => r[patientCol]));
        renderPatientChips();
        renderPatientOptions("");
      } else {
        allPatients = [];
        selectedPatients = [];
        renderPatientChips();
        renderPatientOptions("");
      }

      populateSelect(variableSelect, numericCols, "Selecciona una variable");
      populateSelect(xVariableSelect, allCols, "Automática");

      const filtered = applyLocalFilters(currentRows);
      renderTable(filtered);
      buildChart(filtered);

      setStatus(`Vista cargada: ${viewName} · Filas: ${currentRows.length}`);
    }

    function refreshLocalView(){
      if (!currentRows.length) return;

      const filtered = applyLocalFilters(currentRows);
      renderTable(filtered);
      buildChart(filtered);
      setStatus(`Filas visibles: ${filtered.length} / ${currentRows.length}`);
    }

    function initViews(){
      viewSelect.innerHTML = "";

      VIEWS.forEach(vw => {
        const opt = document.createElement("option");
        opt.value = vw;
        opt.textContent = vw;
        viewSelect.appendChild(opt);
      });
    }

    // =========================
    // EVENTS
    // =========================
    loadBtn.addEventListener("click", loadViewData);

    patientSearch.addEventListener("input", () => {
      renderPatientOptions(patientSearch.value.trim());
    });

    variableSelect.addEventListener("change", refreshLocalView);
    xVariableSelect.addEventListener("change", refreshLocalView);
    searchInput.addEventListener("input", refreshLocalView);

    clearBtn.addEventListener("click", () => {
      selectedPatients = [];
      patientSearch.value = "";
      searchInput.value = "";
      variableSelect.value = "";
      xVariableSelect.value = "";
      renderPatientChips();
      renderPatientOptions("");
      refreshLocalView();
    });

    // =========================
    // INIT
    // =========================
    initViews();
    renderPatientChips();
    renderPatientOptions("");
    setStatus("Selecciona una vista y pulsa Cargar datos.");
  </script>
</body>
</html>
