<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <link rel="icon" href="data:," />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#d9deea;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#2563eb;
      --soft:#eef2ff;
      --soft-text:#1e3a8a;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1400px;
      margin:24px auto;
      padding:0 16px;
    }

    h1{
      margin:0 0 16px;
      font-size:24px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
      margin-bottom:16px;
    }

    .controls-grid{
      display:grid;
      grid-template-columns: 1.2fr 1.2fr 1fr 1fr 1fr 0.9fr 0.9fr;
      gap:12px;
      align-items:end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }

    .field-wide{
      grid-column: span 2;
    }

    .full-width{
      grid-column: 1 / -1;
    }

    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    select, input, button{
      width:100%;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      font-size:14px;
      height:42px;
    }

    #variableSelect{
      height:180px;
      padding:8px;
    }

    button{
      cursor:pointer;
      background:var(--accent);
      color:#fff;
      border:none;
      font-weight:700;
    }

    button.secondary{
      background:#eef2ff;
      color:#1e3a8a;
      border:1px solid #c7d2fe;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:end;
      margin-top:12px;
    }

    .row > div{
      flex:1 1 220px;
    }

    .meta{
      font-size:13px;
      color:var(--muted);
      margin-top:8px;
    }

    .status{
      font-size:13px;
      color:var(--muted);
      margin-top:8px;
      white-space:pre-wrap;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:12px;
      margin-top:12px;
      background:#fff;
      max-height:600px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      text-align:left;
      font-size:13px;
      white-space:nowrap;
    }

    th{
      background:#f8fafc;
      position:sticky;
      top:0;
      z-index:1;
      cursor:pointer;
    }

    canvas{
      width:100% !important;
      max-height:420px;
    }

    #patientChips{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:8px;
      min-height:20px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      background:var(--soft);
      color:var(--soft-text);
      font-size:13px;
    }

    .chip button{
      border:none;
      background:transparent;
      color:var(--soft-text);
      cursor:pointer;
      width:auto;
      padding:0;
      font-size:16px;
      line-height:1;
      height:auto;
    }

    #patientOptions{
      border:1px solid var(--line);
      border-radius:10px;
      max-height:120px;
      overflow:auto;
      margin-top:8px;
      background:#fff;
    }

    .patient-option{
      padding:8px 10px;
      cursor:pointer;
      border-bottom:1px solid #eef2f7;
    }

    .patient-option:hover{
      background:#f8fafc;
    }

    @media (max-width: 1200px){
      .controls-grid{
        grid-template-columns: 1fr 1fr;
      }
      .field-wide{
        grid-column: span 2;
      }
      .full-width{
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 700px){
      .controls-grid{
        grid-template-columns: 1fr;
      }
      .field-wide{
        grid-column: span 1;
      }
    }
  </style>
</head>

    // =========================

    function setStatus(text){

    }

    function uniqueSorted(arr){
      return [...new Set(arr.filter(v => v !== null && v !== undefined && v !== ""))]
        .sort((a,b) => String(a).localeCompare(String(b), "es"));
    }

    function detectIdColumn(row){
      if (!row) return null;
      const keys = Object.keys(row);
      const candidates = ["ID_USUARIO", "id_usuario", "usuario_id", "user_id"];
      return candidates.find(c => keys.includes(c)) || null;
    }

    function detectPatientColumn(row){
      if (!row) return null;
      const keys = Object.keys(row);
      const candidates = ["nombre", "paciente", "NOMBRE", "Paciente"];
      return candidates.find(c => keys.includes(c)) || null;
    }

    function detectDateColumn(row){
      if (!row) return null;
      const keys = Object.keys(row);
      const candidates = ["fecha", "FECHA", "date", "created_at"];
      return candidates.find(c => keys.includes(c)) || null;
    }

    function getNumericColumns(rows){
      if (!rows.length) return [];

      const keys = Object.keys(rows[0]);

      return keys.filter(key => {
        if ([
          "id",
          "ID_USUARIO",
          "id_usuario",
          "nombre",
          "paciente",
          "fecha",
          "created_at"
        ].includes(key)) return false;

        const sample = rows
          .map(r => r[key])
          .filter(v => v !== null && v !== undefined && v !== "")
          .slice(0, 20);

        if (!sample.length) return false;

        return sample.every(v => !isNaN(Number(v)));
      });
    }

    function getAllColumns(rows){
      if (!rows.length) return [];
      return Object.keys(rows[0]).filter(col => col !== "id");
    }

    function populateSingleSelect(selectEl, values, firstLabel){
      selectEl.innerHTML = "";

      const first = document.createElement("option");
      first.value = "";
      first.textContent = firstLabel;
      selectEl.appendChild(first);

      values.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        selectEl.appendChild(opt);
      });
    }

    function populateMultiSelect(selectEl, values){
      selectEl.innerHTML = "";
      values.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        selectEl.appendChild(opt);
      });
    }

    function orderColumns(cols){
      const preferredOrder = [
        "nombre",
        "ID_USUARIO",
        "id_usuario",
        "fecha",
        "paciente"
      ];

      const preferred = preferredOrder.filter(col => cols.includes(col));
      const rest = cols
        .filter(col => !preferredOrder.includes(col))
        .sort((a, b) => a.localeCompare(b, "es"));

      return [...preferred, ...rest];
    }

    function normalizeValue(value){
      if (value === null || value === undefined || value === "") return null;

      const asNumber = Number(value);
      if (!isNaN(asNumber) && String(value).trim() !== "") return asNumber;

      const asDate = Date.parse(value);
      if (!isNaN(asDate)) return asDate;

      return String(value).toLowerCase();
    }

    function sortRows(rows){
      if (!sortColumn) return rows;

      const sorted = [...rows].sort((a, b) => {
        const va = normalizeValue(a[sortColumn]);
        const vb = normalizeValue(b[sortColumn]);

        if (va === null && vb === null) return 0;
        if (va === null) return 1;
        if (vb === null) return -1;

        if (va < vb) return sortDirection === "asc" ? -1 : 1;
        if (va > vb) return sortDirection === "asc" ? 1 : -1;
        return 0;
      });

      return sorted;
    }

    function renderTable(rows){
      tableHead.innerHTML = "";
      tableBody.innerHTML = "";

      if (!rows.length) return;

      const cols = orderColumns(
        Object.keys(rows[0]).filter(col => col !== "id")
      );

      const sortedRows = sortRows(rows);

      const trHead = document.createElement("tr");

      cols.forEach(col => {
        const th = document.createElement("th");

        const arrow =
          sortColumn === col
            ? (sortDirection === "asc" ? " ▲" : " ▼")
            : "";

        th.textContent = col + arrow;

        th.onclick = () => {
          if (sortColumn === col) {
            sortDirection = sortDirection === "asc" ? "desc" : "asc";
          } else {
            sortColumn = col;
            sortDirection = "asc";
          }
          refreshLocalView();
        };

        trHead.appendChild(th);
      });

      tableHead.appendChild(trHead);

      sortedRows.forEach(row => {
        const tr = document.createElement("tr");
        cols.forEach(col => {
          const td = document.createElement("td");
          td.textContent = row[col] ?? "";
          tr.appendChild(td);
        });
        tableBody.appendChild(tr);
      });
    }

    function renderPatientChips() {
      patientChips.innerHTML = "";

      selectedPatients.forEach(name => {
        const chip = document.createElement("div");
        chip.className = "chip";

        const text = document.createElement("span");
        text.textContent = name;

        const close = document.createElement("button");
        close.textContent = "×";
        close.type = "button";
        close.onclick = () => {
          selectedPatients = selectedPatients.filter(p => p !== name);
          renderPatientChips();
          renderPatientOptions(patientSearch.value.trim());
          refreshLocalView();
        };

        chip.appendChild(text);
        chip.appendChild(close);
        patientChips.appendChild(chip);
      });
    }

    function renderPatientOptions(query = "") {
      patientOptions.innerHTML = "";

      const normalized = query.toLowerCase();

      const visible = allPatients.filter(name =>
        !selectedPatients.includes(name) &&
        (!normalized || String(name).toLowerCase().includes(normalized))
      );

      visible.forEach(name => {
        const row = document.createElement("div");
        row.className = "patient-option";
        row.textContent = name;
        row.onclick = () => {
          selectedPatients.push(name);
          selectedPatients = [...new Set(selectedPatients)].sort((a,b) => a.localeCompare(b, "es"));
          patientSearch.value = "";
          renderPatientChips();
          renderPatientOptions("");
          refreshLocalView();
        };
        patientOptions.appendChild(row);
      });
    }

    function applyLocalFilters(rows){
      if (!rows.length) return [];

      const patientCol = detectPatientColumn(rows[0]);

      let out = [...rows];

      if (selectedPatients.length && patientCol){
        out = out.filter(r => selectedPatients.includes(String(r[patientCol])));
      }

      if (searchInput.value.trim()){
        const q = searchInput.value.trim().toLowerCase();
        out = out.filter(r =>
          Object.values(r).some(v => String(v ?? "").toLowerCase().includes(q))
        );
      }

      return out;
    }

    function getSelectedValues(selectEl) {
      return Array.from(selectEl.selectedOptions)
        .map(o => o.value)
        .filter(Boolean);
    }

    function isNumericValue(v) {
      return v !== null && v !== undefined && v !== "" && !isNaN(Number(v));
    }

    function buildHistogram(values, bins = 12) {
      if (!values.length) return { labels: [], counts: [] };

      const min = Math.min(...values);
      const max = Math.max(...values);

      if (min === max) {
        return {
          labels: [String(min)],
          counts: [values.length]
        };
      }

      const width = (max - min) / bins;
      const counts = new Array(bins).fill(0);
      const labels = [];

      for (let i = 0; i < bins; i++) {
        const start = min + i * width;
        const end = i === bins - 1 ? max : start + width;
        labels.push(`${start.toFixed(2)}-${end.toFixed(2)}`);
      }

      values.forEach(v => {
        let idx = Math.floor((v - min) / width);
        if (idx >= bins) idx = bins - 1;
        if (idx < 0) idx = 0;
        counts[idx]++;
      });

      return { labels, counts };
    }

    function buildChart(rows) {
      if (!rows.length) {
        chartCard.style.display = "none";
        metaEl.textContent = "";
        if (currentChart) currentChart.destroy();
        return;
      }

      const selectedYVariables = getSelectedValues(variableSelect);
      if (!selectedYVariables.length) {
        chartCard.style.display = "none";
        metaEl.textContent = "";
        if (currentChart) currentChart.destroy();
        return;
      }

      chartCard.style.display = "block";

      const autoDateCol = detectDateColumn(rows[0]);
      const autoIdCol = detectIdColumn(rows[0]);
      const autoPatientCol = detectPatientColumn(rows[0]);

      const selectedX = xVariableSelect.value;
      const xCol = selectedX || autoDateCol || autoPatientCol || autoIdCol;

      const chartTypeRaw = chartTypeSelect.value || "auto";
      const maxSeries = Number(seriesLimitSelect.value || 3);
      const yVariables = selectedYVariables.slice(0, maxSeries);

      const resolvedType =
        chartTypeRaw === "auto"
          ? ((xCol && xCol.toLowerCase().includes("fecha")) ? "line" : "bar")
          : chartTypeRaw;

      if (currentChart) currentChart.destroy();

      const ctx = document.getElementById("chart");

      if (resolvedType === "histogram") {
        const yVar = yVariables[0];
        const values = rows
          .map(r => r[yVar])
          .filter(isNumericValue)
          .map(Number)
          .slice(0, 500);

        const hist = buildHistogram(values, 12);

        currentChart = new Chart(ctx, {
          type: "bar",
          data: {
            labels: hist.labels,
            datasets: [{
              label: `Histograma de ${yVar}`,
              data: hist.counts
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { display: true }
            },
            scales: {
              y: { beginAtZero: true }
            }
          }
        });

        metaEl.textContent =
          `Tipo: histograma · Variable: ${yVar} · Valores usados: ${values.length}`;
        return;
      }

      let chartRows = rows.slice(0, 200);

      if (resolvedType === "scatter") {
        const datasets = yVariables.map((yVar) => {
          const points = chartRows
            .map((r, idx) => {
              const rawY = r[yVar];
              if (!isNumericValue(rawY)) return null;

              let rawX;
              if (xCol && isNumericValue(r[xCol])) {
                rawX = Number(r[xCol]);
              } else {
                rawX = idx + 1;
              }

              return { x: rawX, y: Number(rawY) };
            })
            .filter(Boolean);

          return {
            label: yVar,
            data: points
          };
        });

        currentChart = new Chart(ctx, {
          type: "scatter",
          data: { datasets },
          options: {
            responsive: true,
            plugins: {
              legend: { display: true }
            },
            scales: {
              x: { type: "linear", beginAtZero: false },
              y: { beginAtZero: false }
            }
          }
        });

        metaEl.textContent =
          `Tipo: dispersión · Eje X: ${xCol && isNumericValue(chartRows[0]?.[xCol]) ? xCol : "índice de fila"} · Variables Y: ${yVariables.join(", ")}`;
        return;
      }

      const labels = chartRows.map((r, idx) => {
        if (!xCol) return `fila ${idx + 1}`;
        return String(r[xCol] ?? `fila ${idx + 1}`);
      });

      const datasets = yVariables.map((yVar) => ({
        label: yVar,
        data: chartRows.map(r => isNumericValue(r[yVar]) ? Number(r[yVar]) : null)
      }));

      currentChart = new Chart(ctx, {
        type: resolvedType,
        data: {
          labels,
          datasets
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: true }
          },
          scales: {
            y: { beginAtZero: false }
          }
        }
      });

      metaEl.textContent =
        `Filas graficadas: ${chartRows.length} · Tipo: ${resolvedType} · Eje X: ${xCol || "automático"} · Variables Y: ${yVariables.join(", ")}`;
    }

   async function loadPatientsMap() {
  const { data, error } = await sb
    .schema("public")
    .from("pacientes")
    .select("ID_USUARIO, nombre");

  if (error) {
    console.error("Error cargando pacientes:", error);
    return new Map();
  }

  const map = new Map();

  (data || []).forEach(row => {
    if (row.ID_USUARIO) {
      map.set(String(row.ID_USUARIO), row.nombre || "");
    }
  });

  return map;
}

    async function loadViewData(){
  const viewName = viewSelect.value;

  if (!viewName){
    setStatus("Selecciona una vista.");
    return;
  }

  setStatus(`Cargando ${viewName}...`);

  const { data, error } = await sb
    .schema("tesis_views")
    .from(viewName)
    .select("*")
    .limit(1000);

  if (error){
    setStatus(`Error al cargar ${viewName}: ${error.message}`);
    console.error(error);
    return;
  }

  const patientsMap = await loadPatientsMap();

  currentRows = (data || []).map(row => {
    const idUsuario = row.ID_USUARIO ?? row.id_usuario ?? "";
    return {
      ...row,
      nombre: patientsMap.get(String(idUsuario)) || row.nombre || ""
    };
  });

  if (!currentRows.length){
    setStatus(`La vista ${viewName} no devolvió filas.`);
    variableSelect.innerHTML = "";
    xVariableSelect.innerHTML = `<option value="">Automática</option>`;
    renderTable([]);
    if (currentChart) currentChart.destroy();
    metaEl.textContent = "";
    allPatients = [];
    selectedPatients = [];
    renderPatientChips();
    renderPatientOptions("");
    chartCard.style.display = "none";
    return;
  }

  const firstRow = currentRows[0];
  const patientCol = detectPatientColumn(firstRow);
  const numericCols = getNumericColumns(currentRows);
  const allCols = getAllColumns(currentRows);

  if (patientCol){
    allPatients = uniqueSorted(currentRows.map(r => r[patientCol]));
  } else {
    allPatients = [];
    selectedPatients = [];
  }

  renderPatientChips();
  renderPatientOptions("");

  populateMultiSelect(variableSelect, numericCols);
  populateSingleSelect(xVariableSelect, allCols, "Automática");

  sortColumn = null;
  sortDirection = "asc";

  refreshLocalView();
  setStatus(`Vista cargada: ${viewName} · Filas: ${currentRows.length}`);
}

    function refreshLocalView(){
      if (!currentRows.length) {
        currentFilteredRows = [];
        renderTable([]);
        buildChart([]);
        return;
      }

      currentFilteredRows = applyLocalFilters(currentRows);
      renderTable(currentFilteredRows);
      buildChart(currentFilteredRows);
      setStatus(`Filas visibles: ${currentFilteredRows.length} / ${currentRows.length}`);
    }

    function initViews(){
      viewSelect.innerHTML = "";
      VIEWS.forEach(vw => {
        const opt = document.createElement("option");
        opt.value = vw;
        opt.textContent = vw;
        viewSelect.appendChild(opt);
      });
    }

    // =========================
    // EVENTS
    // =========================
    loadBtn.addEventListener("click", loadViewData);

    patientSearch.addEventListener("input", () => {
      renderPatientOptions(patientSearch.value.trim());
    });

    variableSelect.addEventListener("change", refreshLocalView);
    xVariableSelect.addEventListener("change", refreshLocalView);
    chartTypeSelect.addEventListener("change", refreshLocalView);
    seriesLimitSelect.addEventListener("change", refreshLocalView);
    searchInput.addEventListener("input", refreshLocalView);

    swapAxesBtn.addEventListener("click", () => {
      const selectedY = getSelectedValues(variableSelect);

      if (selectedY.length !== 1) {
        alert("Para intercambiar X e Y debes seleccionar exactamente una variable Y.");
        return;
      }

      const currentY = selectedY[0];
      const currentX = xVariableSelect.value;

      if (!currentX) {
        alert("Primero elige una variable X explícita para poder intercambiar.");
        return;
      }

      Array.from(variableSelect.options).forEach(opt => {
        opt.selected = (opt.value === currentX);
      });

      xVariableSelect.value = currentY;
      refreshLocalView();
    });

    clearBtn.addEventListener("click", () => {
      selectedPatients = [];
      patientSearch.value = "";
      searchInput.value = "";
      xVariableSelect.value = "";
      chartTypeSelect.value = "auto";
      seriesLimitSelect.value = "3";

      Array.from(variableSelect.options).forEach(opt => {
        opt.selected = false;
      });

      renderPatientChips();
      renderPatientOptions("");
      refreshLocalView();
    });

    // =========================
    // INIT
    // =========================
    initViews();
    renderPatientChips();
    renderPatientOptions("");
    setStatus("Selecciona una vista y pulsa Cargar datos.");
  </script>
</body>
</html>
